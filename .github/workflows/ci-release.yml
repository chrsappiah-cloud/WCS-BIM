# Release candidate — full unit + all UI tiers before shipping.
name: CI Release Candidate

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  release-candidate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app/Contents/Developer
      - name: Resolve simulator destination
        id: sim
        run: |
          DEST=$(xcodebuild -project WCS-BIM.xcodeproj -scheme WCS-BIM -showdestinations 2>/dev/null \
            | awk -F'[{},]' '/platform:iOS Simulator/ && /OS:/{print $0}' | head -1)
          NAME=$(echo "$DEST" | sed -n 's/.*name:\([^,}]*\).*/\1/p' | xargs)
          OS=$(echo "$DEST" | sed -n 's/.*OS:\([^,}]*\).*/\1/p' | xargs)
          echo "destination=platform=iOS Simulator,name=${NAME},OS=${OS}" >> "$GITHUB_OUTPUT"
      - name: Build
        run: |
          xcodebuild -project WCS-BIM.xcodeproj -scheme WCS-BIM \
            -destination '${{ steps.sim.outputs.destination }}' build
      - name: Full unit suite
        run: |
          xcodebuild -project WCS-BIM.xcodeproj -scheme WCS-BIM \
            -destination '${{ steps.sim.outputs.destination }}' \
            -only-testing:WCS-BIMTests test
      - name: Full UI suite (Tiers 1–3 + launch)
        run: |
          xcodebuild -project WCS-BIM.xcodeproj -scheme WCS-BIM \
            -destination '${{ steps.sim.outputs.destination }}' \
            -only-testing:WCS-BIMUITests \
            -skip-testing:WCS-BIMUITests/Tier5PerformanceUITests \
            test
