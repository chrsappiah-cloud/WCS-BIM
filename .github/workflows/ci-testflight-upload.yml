# Production TestFlight upload — archive Release and submit to App Store Connect.
name: CI TestFlight Upload

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Optional build number override (integer)'
        required: false
  push:
    tags: ['v*']

concurrency:
  group: testflight-upload-${{ github.ref }}
  cancel-in-progress: false

jobs:
  upload-testflight:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app/Contents/Developer

      - name: Bump build number (tag / manual)
        if: github.event_name == 'workflow_dispatch' && inputs.build_number != ''
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ inputs.build_number }}" WCS-BIM/Info.plist

      - name: Validate integrations
        run: bash scripts/api/validate-integrations.sh

      - name: Resolve simulator for unit gate
        id: sim
        run: |
          DEST=$(xcodebuild -project WCS-BIM.xcodeproj -scheme WCS-BIM -showdestinations 2>/dev/null \
            | awk -F'[{},]' '/platform:iOS Simulator/ && /OS:/{print $0}' | head -1)
          NAME=$(echo "$DEST" | sed -n 's/.*name:\([^,}]*\).*/\1/p' | xargs)
          OS=$(echo "$DEST" | sed -n 's/.*OS:\([^,}]*\).*/\1/p' | xargs)
          echo "destination=platform=iOS Simulator,name=${NAME},OS=${OS}" >> "$GITHUB_OUTPUT"

      - name: Unit tests (simulator gate)
        run: |
          xcodebuild -project WCS-BIM.xcodeproj -scheme WCS-BIM \
            -destination '${{ steps.sim.outputs.destination }}' \
            -only-testing:WCS-BIMTests \
            -skip-testing:WCS-BIMTests/ModelContainerBootstrapTests \
            test

      - name: Write App Store Connect API key
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          echo "$ASC_PRIVATE_KEY" > /tmp/AuthKey.p8
          cat >> "$GITHUB_ENV" <<EOF
          ASC_KEY_ID=${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID=${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY_PATH=/tmp/AuthKey.p8
          ASC_APP_ID=${{ secrets.ASC_APP_ID }}
          EOF

      - name: Archive and upload to TestFlight
        run: bash scripts/testflight/archive-and-upload.sh

      - name: List TestFlight builds
        run: |
          pip install -r scripts/testflight/requirements.txt
          python scripts/testflight/admin_cli.py testflight list-builds
