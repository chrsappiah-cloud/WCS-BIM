# API integration gate — catalog validation + unit tests for sensors/AI hub.
name: CI API Integrations

on:
  push:
    branches: [main]
    paths:
      - 'WCS-BIM/APIIntegration/**'
      - 'WCS-BIM/Presentation/FieldSystems/**'
      - 'WCS-BIMTests/Integration/APIIntegrationTests.swift'
      - 'scripts/api/**'
      - '.github/workflows/ci-integrations-api.yml'
  pull_request:
    branches: [main]
    paths:
      - 'WCS-BIM/APIIntegration/**'
      - 'WCS-BIM/Presentation/FieldSystems/**'
      - 'WCS-BIMTests/Integration/APIIntegrationTests.swift'
      - 'scripts/api/**'
      - '.github/workflows/ci-integrations-api.yml'
  workflow_dispatch:

jobs:
  validate-integrations:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate integration sources
        run: bash scripts/api/validate-integrations.sh

      - name: Set up Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app/Contents/Developer

      - name: Resolve simulator destination
        id: sim
        run: |
          DEST=$(xcodebuild -project WCS-BIM.xcodeproj -scheme WCS-BIM -showdestinations 2>/dev/null \
            | awk -F'[{},]' '/platform:iOS Simulator/ && /OS:/{print $0}' | head -1)
          if [ -z "$DEST" ]; then
            echo "destination=generic/platform=iOS Simulator" >> "$GITHUB_OUTPUT"
          else
            NAME=$(echo "$DEST" | sed -n 's/.*name:\([^,}]*\).*/\1/p' | xargs)
            OS=$(echo "$DEST" | sed -n 's/.*OS:\([^,}]*\).*/\1/p' | xargs)
            echo "destination=platform=iOS Simulator,name=${NAME},OS=${OS}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: |
          xcodebuild -project WCS-BIM.xcodeproj -scheme WCS-BIM \
            -destination '${{ steps.sim.outputs.destination }}' build

      - name: API integration unit tests
        run: |
          xcodebuild -project WCS-BIM.xcodeproj -scheme WCS-BIM \
            -destination '${{ steps.sim.outputs.destination }}' \
            -only-testing:WCS-BIMTests/APIIntegrationTests \
            test
